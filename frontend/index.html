<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🤖 AI BOT</h2>
    <button onclick="newChat()">+ New Chat</button>
  </div>

  <!-- MAIN CHAT -->
  <div class="main">
    <div id="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="Nhập câu hỏi..." />
      <button onclick="send()">➤</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
